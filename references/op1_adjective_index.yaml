# OP-1 Field Adjective → Parameter Reverse Index
# ============================================================
# Maps sound-design adjectives to specific OP-1 Field parameters.
# Every mapping cites a real param from op1_recipe_compiler_reference.yaml
# with its audible_tendency as evidence.
#
# Used by the fallback strategy when no intent alias matches:
# instead of "parse adjectives against a 5-step vocabulary with no mapping",
# the agent looks up the adjective here and gets concrete params to turn.
#
# Direction values: high | low | medium | off_center | specific_value
# All audible_tendency strings are quoted verbatim from the compiler reference.
# ============================================================

adjectives:

  warm:
    acoustic_meaning: "even harmonics, low-pass filter, slight detune, tube-style saturation, low-mid frequency emphasis"
    params:
      - {engine: voltage, color: blue, param: AMPERE, direction: high, audible_tendency: "higher = warmer saturation", reason: "tube-style saturation modeling"}
      - {engine: string, color: blue, param: TENSION, direction: low, audible_tendency: "low = loose/sustained/warm", reason: "loose string = warm sustained tone"}
      - {engine: cluster, color: grey, param: SPREAD, direction: medium, audible_tendency: "higher = wider/more detuned", reason: "moderate detune adds warmth without chaos"}
      - {engine: digital, color: ochre, param: OCTAVE, direction: low, audible_tendency: "lower = deeper sub", reason: "sub-osc adds low-mid weight"}
    fx_overlays:
      - {fx: mother, color: grey, param: COLOR, direction: low, audible_tendency: "lower = darker", reason: "darker reverb tone"}
      - {fx: spring, color: blue, param: TONE, direction: low, audible_tendency: "higher = brighter", reason: "dark spring tone (low end of TONE)"}
    envelope_hint: "slower attack (20-80ms), medium release"
    lfo_hint: "slow, subtle detune movement"

  bright:
    acoustic_meaning: "high cutoff filter, saw/square waveform, high resonance, high FM amount, high-frequency emphasis"
    params:
      - {engine: digital, color: blue, param: WAVE SHAPER, direction: high, audible_tendency: "higher = brighter/grittier", reason: "wave shaping adds high harmonics"}
      - {engine: cluster, color: ochre, param: WAVE ENV, direction: high, audible_tendency: "higher = brighter/more aggressive", reason: "filter envelope opens up"}
      - {engine: fm, color: blue, param: "FREQ (FM AMOUNT)", direction: high, audible_tendency: "higher = brighter/clangier/more bite", reason: "FM modulation adds bright harmonics"}
      - {engine: dimension, color: grey, param: FILTER FREQ, direction: high, audible_tendency: "higher Hz = brighter", reason: "opens the low-pass cutoff"}
      - {engine: voltage, color: grey, param: "VOLT (FILTER)", direction: high, audible_tendency: "higher = brighter", reason: "opens the analog-modeled filter"}
    fx_overlays:
      - {fx: spring, color: blue, param: TONE, direction: high, audible_tendency: "higher = brighter", reason: "bright spring tone"}
      - {fx: mother, color: grey, param: COLOR, direction: high, audible_tendency: "lower = darker", reason: "keep COLOR high (away from dark end)"}
    envelope_hint: "fast attack, medium release"
    lfo_hint: "fast, bright vibrato or filter sweep"

  dark:
    acoustic_meaning: "very low filter cutoff, sine/triangle waveform, no distortion, slow or no modulation"
    params:
      - {engine: dimension, color: grey, param: FILTER FREQ, direction: low, audible_tendency: "higher Hz = brighter", reason: "low Hz = dark/closed tone (e.g. ~500-1500)"}
      - {engine: voltage, color: grey, param: "VOLT (FILTER)", direction: low, audible_tendency: "higher = brighter", reason: "low filter cutoff = dark"}
      - {engine: digital, color: orange, param: DIGITALNESS, direction: low, audible_tendency: "higher = grittier/lo-fi", reason: "keep clean, no high-freq grit"}
      - {engine: dr_wave, color: ochre, param: FILTER, direction: high, audible_tendency: "depends on side", reason: "upper range (51-99) = low-pass filter"}
    fx_overlays:
      - {fx: mother, color: grey, param: COLOR, direction: low, audible_tendency: "lower = darker", reason: "dark reverb tone"}
      - {fx: spring, color: blue, param: TONE, direction: low, audible_tendency: "higher = brighter", reason: "dark spring tone"}
      - {fx: terminal, color: grey, param: MODEL, direction: high, audible_tendency: "depends on side", reason: "above 3 = low-pass filter"}
    envelope_hint: "slow attack, long release"
    lfo_hint: "very slow, subtle filter movement"

  glassy:
    acoustic_meaning: "high bandpass filter, high resonance, sine/FM waveform, short bright reverb"
    params:
      - {engine: fm, color: blue, param: "FREQ (FM AMOUNT)", direction: medium, audible_tendency: "higher = brighter/clangier/more bite", reason: "moderate FM = glassy partials (start low, raise slightly)"}
      - {engine: fm, color: orange, param: DETUNE, direction: high, audible_tendency: "higher = more movement/clang", reason: "detune adds glassy shimmer"}
      - {engine: dimension, color: orange, param: RES, direction: high, audible_tendency: "higher = squelchier/acid", reason: "high resonance = glassy ringing"}
      - {engine: dimension, color: grey, param: FILTER FREQ, direction: high, audible_tendency: "higher Hz = brighter", reason: "high cutoff for glassy clarity"}
    fx_overlays:
      - {fx: spring, color: blue, param: TONE, direction: high, audible_tendency: "higher = brighter", reason: "bright short spring"}
      - {fx: delay, color: blue, param: RANGE, direction: low, audible_tendency: "higher = longer", reason: "short echo for glassy reflections"}
    envelope_hint: "instant attack, long natural decay"
    lfo_hint: "slow, subtle detune for life"

  gritty:
    acoustic_meaning: "low-mid filter, medium-high resonance, square/noise waveform, heavy distortion"
    params:
      - {engine: voltage, color: ochre, param: GROUND NOISE, direction: high, audible_tendency: "higher = grittier/noisier", reason: "ground noise distortion adds grit"}
      - {engine: digital, color: orange, param: DIGITALNESS, direction: high, audible_tendency: "higher = grittier/lo-fi", reason: "digital noise/grit"}
      - {engine: phase, color: ochre, param: DIST, direction: high, audible_tendency: "higher = grittier", reason: "wave distortion/clipping-folding"}
      - {engine: dr_wave, color: blue, param: "TYPE & LENGTH", direction: high, audible_tendency: "higher = more lo-fi/crushed", reason: "sample-rate reduction grit"}
    fx_overlays:
      - {fx: terminal, color: blue, param: KHZ, direction: low, audible_tendency: "lower = crunchier", reason: "low sample-rate grit"}
      - {fx: terminal, color: ochre, param: BITS, direction: low, audible_tendency: "lower = more crushed", reason: "bit reduction grit"}
    envelope_hint: "fast attack, medium release"
    lfo_hint: "random, irregular modulation"

  airy:
    acoustic_meaning: "high filter cutoff, low resonance, sine/triangle waveform, long light reverb"
    params:
      - {engine: dimension, color: grey, param: FILTER FREQ, direction: high, audible_tendency: "higher Hz = brighter", reason: "open filter for air"}
      - {engine: cluster, color: grey, param: SPREAD, direction: high, audible_tendency: "higher = wider/more detuned", reason: "wide stereo spread = airy openness"}
      - {engine: dimension, color: ochre, param: STEREO, direction: high, audible_tendency: "higher = wider", reason: "chorus/width modulation adds air"}
      - {engine: voltage, color: grey, param: "VOLT (FILTER)", direction: high, audible_tendency: "higher = brighter", reason: "open filter for high-frequency air"}
    fx_overlays:
      - {fx: mother, color: blue, param: DISTANCE, direction: high, audible_tendency: "higher = bigger/farther", reason: "large space = airy reverb"}
      - {fx: spring, color: grey, param: DAMPING, direction: low, audible_tendency: "higher = shorter/softer tail", reason: "low damping = long airy tail"}
      - {fx: mother, color: orange, param: MIX, direction: low, audible_tendency: "higher = wetter", reason: "keep mix low for light air, not wash"}
    envelope_hint: "slow attack, long release"
    lfo_hint: "slow, subtle filter or detune movement"

  hollow:
    acoustic_meaning: "mid filter cutoff, high resonance, square/PWM waveform, no reverb"
    params:
      - {engine: pulse, color: grey, param: "TIME (2ND PULSE)", direction: off_center, audible_tendency: "off-center = hollow/PWM-ready", reason: "off-center pulse width = hollow tone"}
      - {engine: pulse, color: orange, param: MOD, direction: off_center, audible_tendency: "off-center = animated PWM", reason: "PWM adds hollow character (move away from 50 center)"}
      - {engine: dr_wave, color: grey, param: PHASE, direction: low, audible_tendency: "higher = brighter/formant", reason: "low phase = pulse width region for hollow tone"}
      - {engine: dimension, color: orange, param: RES, direction: high, audible_tendency: "higher = squelchier/acid", reason: "high resonance at mid cutoff = hollow formant"}
    fx_overlays: []
    envelope_hint: "medium attack, medium release"
    lfo_hint: "none (static) or slow PWM on TIME"

  fat:
    acoustic_meaning: "mid-low filter, low resonance, dual detuned saws, light saturation"
    params:
      - {engine: cluster, color: blue, param: WAVES, direction: high, audible_tendency: "higher = thicker, wider", reason: "more oscillators = fatter sound"}
      - {engine: voltage, color: orange, param: DETUNE, direction: high, audible_tendency: "higher = thicker/detuned", reason: "sub-osc detune adds fatness"}
      - {engine: cluster, color: grey, param: SPREAD, direction: high, audible_tendency: "higher = wider/more detuned", reason: "wide detune spread = fat width"}
      - {engine: digital, color: ochre, param: OCTAVE, direction: low, audible_tendency: "lower = deeper sub", reason: "sub-osc adds low-end weight"}
    fx_overlays:
      - {fx: punch, color: ochre, param: PUNCH, direction: high, audible_tendency: "higher = punchier/more resonant", reason: "compression + resonance for fat glue"}
    envelope_hint: "fast attack, medium-long release"
    lfo_hint: "slow, subtle detune movement"

  deep:
    acoustic_meaning: "very low filter cutoff, sine/sub waveform, no distortion, slow modulation"
    params:
      - {engine: digital, color: ochre, param: OCTAVE, direction: low, audible_tendency: "lower = deeper sub", reason: "sub-oscillator drops to deep low end"}
      - {engine: dimension, color: grey, param: FILTER FREQ, direction: low, audible_tendency: "higher Hz = brighter", reason: "low Hz (e.g. ~500-800) = deep/dark"}
      - {engine: voltage, color: grey, param: "VOLT (FILTER)", direction: low, audible_tendency: "higher = brighter", reason: "low filter cutoff = deep tone"}
    fx_overlays: []
    envelope_hint: "slow attack, long release"
    lfo_hint: "very slow, subtle filter movement"

  clean:
    acoustic_meaning: "high filter cutoff, low resonance, sine/saw waveform, no distortion"
    params:
      - {engine: digital, color: orange, param: DIGITALNESS, direction: low, audible_tendency: "higher = grittier/lo-fi", reason: "low digitalness = clean tone"}
      - {engine: dr_wave, color: blue, param: "TYPE & LENGTH", direction: low, audible_tendency: "higher = more lo-fi/crushed", reason: "low type = clean morph, no sample-rate reduction"}
      - {engine: voltage, color: ochre, param: GROUND NOISE, direction: low, audible_tendency: "higher = grittier/noisier", reason: "low ground noise = clean"}
      - {engine: dimension, color: orange, param: RES, direction: low, audible_tendency: "higher = squelchier/acid", reason: "low resonance = clean filter"}
    fx_overlays: []
    envelope_hint: "medium attack, medium release"
    lfo_hint: "none (static) preferred"

  dirty:
    acoustic_meaning: "low-mid filter, medium resonance, square/noise waveform, heavy distortion"
    params:
      - {engine: digital, color: orange, param: DIGITALNESS, direction: high, audible_tendency: "higher = grittier/lo-fi", reason: "digital noise/grit dirties the tone"}
      - {engine: voltage, color: ochre, param: GROUND NOISE, direction: high, audible_tendency: "higher = grittier/noisier", reason: "ground noise distortion"}
      - {engine: phase, color: ochre, param: DIST, direction: high, audible_tendency: "higher = grittier", reason: "wave distortion/folding"}
    fx_overlays:
      - {fx: terminal, color: blue, param: KHZ, direction: low, audible_tendency: "lower = crunchier", reason: "sample-rate reduction"}
      - {fx: terminal, color: ochre, param: BITS, direction: low, audible_tendency: "lower = more crushed", reason: "bit reduction"}
      - {fx: phone, color: grey, param: BAUD, direction: high, audible_tendency: "higher = more digital destruction", reason: "granular bit destruction"}
    envelope_hint: "fast attack, medium release"
    lfo_hint: "random, irregular modulation"

  aggressive:
    acoustic_meaning: "high filter, high resonance, saw/square waveform, heavy distortion, fast modulation"
    params:
      - {engine: cluster, color: ochre, param: WAVE ENV, direction: high, audible_tendency: "higher = brighter/more aggressive", reason: "aggressive supersaw filter envelope"}
      - {engine: digital, color: grey, param: "DETUNE / RING MOD", direction: high, audible_tendency: "upper half = clangorous/metallic", reason: "ring mod adds aggressive clang"}
      - {engine: digital, color: orange, param: DIGITALNESS, direction: high, audible_tendency: "higher = grittier/lo-fi", reason: "digital grit for aggression"}
      - {engine: phase, color: orange, param: TILT, direction: high, audible_tendency: "higher = noisier/harsher", reason: "asymmetric wave folding = harsh aggressive tone"}
    fx_overlays:
      - {fx: punch, color: ochre, param: PUNCH, direction: high, audible_tendency: "higher = punchier/more resonant", reason: "aggressive punch and resonance"}
      - {fx: punch, color: grey, param: ROUNDS, direction: high, audible_tendency: "higher = steeper/more aggressive", reason: "steeper filter slope = more aggressive"}
      - {fx: nitro, color: grey, param: Q, direction: high, audible_tendency: "higher = squelchier", reason: "high Q = aggressive resonance"}
    envelope_hint: "instant attack, short-medium release"
    lfo_hint: "fast, aggressive filter sweep"

  soft:
    acoustic_meaning: "mid filter, low resonance, complex/physical waveform, no distortion, slow attack"
    params:
      - {engine: string, color: orange, param: IMP TYPE, direction: high, audible_tendency: "high = soft (finger/bow)", reason: "soft excitation = gentle pluck"}
      - {engine: string, color: blue, param: TENSION, direction: low, audible_tendency: "low = loose/sustained/warm", reason: "loose string = soft sustained tone"}
      - {engine: cluster, color: ochre, param: WAVE ENV, direction: low, audible_tendency: "higher = brighter/more aggressive", reason: "low wave env = mellow/soft"}
      - {engine: voltage, color: ochre, param: GROUND NOISE, direction: low, audible_tendency: "higher = grittier/noisier", reason: "no distortion = soft"}
    fx_overlays:
      - {fx: spring, color: grey, param: DAMPING, direction: high, audible_tendency: "higher = shorter/softer tail", reason: "soft, dampened reverb tail"}
    envelope_hint: "slow attack (50-200ms), long release"
    lfo_hint: "slow, gentle detune"

  hard:
    acoustic_meaning: "mid-high filter, high resonance, square waveform, distortion, instant attack"
    params:
      - {engine: string, color: orange, param: IMP TYPE, direction: low, audible_tendency: "low = hard strike (plectrum)", reason: "hard strike = sharp transient"}
      - {engine: cluster, color: ochre, param: WAVE ENV, direction: high, audible_tendency: "higher = brighter/more aggressive", reason: "bright = hard-edged"}
      - {engine: phase, color: orange, param: TILT, direction: high, audible_tendency: "higher = noisier/harsher", reason: "harsh wave folding = hard tone"}
    fx_overlays:
      - {fx: punch, color: ochre, param: PUNCH, direction: high, audible_tendency: "higher = punchier/more resonant", reason: "hard-hitting punch"}
      - {fx: amp, color: orange, param: DRIVE, direction: high, audible_tendency: "higher = more distortion", reason: "hard drive on input"}
      - {fx: amp, color: ochre, param: COMPRESSION, direction: high, audible_tendency: "higher = more compressed/punchy", reason: "hard compression"}
    envelope_hint: "instant attack, short release"
    lfo_hint: "none (static) preferred"

  metallic:
    acoustic_meaning: "high filter, high resonance, FM/ring-mod waveform, short reverb"
    params:
      - {engine: fm, color: blue, param: "FREQ (FM AMOUNT)", direction: high, audible_tendency: "higher = brighter/clangier/more bite", reason: "FM produces metallic inharmonic partials"}
      - {engine: digital, color: grey, param: "DETUNE / RING MOD", direction: high, audible_tendency: "upper half = clangorous/metallic", reason: "ring modulation = metallic clang"}
      - {engine: fm, color: orange, param: DETUNE, direction: high, audible_tendency: "higher = more movement/clang", reason: "operator detune adds metallic shimmer"}
    fx_overlays:
      - {fx: cwo, color: orange, param: SIDEBAND, direction: high, audible_tendency: "higher = more extreme/metallic", reason: "metallic sideband audio"}
      - {fx: spring, color: ochre, param: TURNS, direction: high, audible_tendency: "higher = bigger/more metallic", reason: "metallic spring character"}
    envelope_hint: "instant attack, short-medium release"
    lfo_hint: "medium, metallic detune movement"

  organic:
    acoustic_meaning: "mid filter, low resonance, complex/physical waveform, slow random modulation, warm reverb"
    params:
      - {engine: string, color: blue, param: TENSION, direction: low, audible_tendency: "low = loose/sustained/warm", reason: "loose string = organic sustained tone"}
      - {engine: string, color: ochre, param: "IMP (DECAY)", direction: high, audible_tendency: "high = long bow/strum/sustain", reason: "long natural decay = organic"}
      - {engine: cluster, color: orange, param: UNISON, direction: high, audible_tendency: "higher = more movement/shimmer", reason: "natural drift = organic movement"}
    fx_overlays:
      - {fx: spring, color: blue, param: TONE, direction: low, audible_tendency: "higher = brighter", reason: "warm spring tone"}
    envelope_hint: "medium attack, natural decay"
    lfo_hint: "random LFO, slow speed for organic drift"

  digital:
    acoustic_meaning: "harsh digital waveform, bit reduction, sample-rate reduction, digital noise"
    params:
      - {engine: digital, color: orange, param: DIGITALNESS, direction: high, audible_tendency: "higher = grittier/lo-fi", reason: "digital noise and grit"}
      - {engine: dr_wave, color: blue, param: "TYPE & LENGTH", direction: high, audible_tendency: "higher = more lo-fi/crushed", reason: "sample-rate reduction = digital character"}
      - {engine: digital, color: grey, param: "DETUNE / RING MOD", direction: high, audible_tendency: "upper half = clangorous/metallic", reason: "ring mod = digital metallic"}
    fx_overlays:
      - {fx: terminal, color: blue, param: KHZ, direction: low, audible_tendency: "lower = crunchier", reason: "low sample-rate = digital crunch"}
      - {fx: terminal, color: ochre, param: BITS, direction: low, audible_tendency: "lower = more crushed", reason: "bit reduction = digital character"}
      - {fx: phone, color: grey, param: BAUD, direction: high, audible_tendency: "higher = more digital destruction", reason: "digital grain destruction"}
    envelope_hint: "fast attack, short release"
    lfo_hint: "fast, rhythmic digital modulation"

  analog:
    acoustic_meaning: "warm saturation, slight detune, low-pass filter, vintage character"
    params:
      - {engine: voltage, color: blue, param: AMPERE, direction: high, audible_tendency: "higher = warmer saturation", reason: "analog-modeled saturation"}
      - {engine: voltage, color: orange, param: DETUNE, direction: high, audible_tendency: "higher = thicker/detuned", reason: "sub-osc detune = analog warmth"}
      - {engine: voltage, color: grey, param: "VOLT (FILTER)", direction: medium, audible_tendency: "higher = brighter", reason: "medium filter = warm analog tone"}
      - {engine: voltage, color: ochre, param: GROUND NOISE, direction: medium, audible_tendency: "higher = grittier/noisier", reason: "moderate noise = analog character"}
    fx_overlays: []
    envelope_hint: "medium attack, medium release"
    lfo_hint: "slow, subtle detune drift"

  retro:
    acoustic_meaning: "warm filter, vintage waveform, tape/spring reverb, nostalgic character"
    params:
      - {engine: phase, color: blue, param: PHASE, direction: medium, audible_tendency: "higher = brighter/buzzier", reason: "phase distortion = retro CZ-style tone"}
      - {engine: dr_wave, color: blue, param: "TYPE & LENGTH", direction: medium, audible_tendency: "higher = more lo-fi/crushed", reason: "moderate lo-fi = retro character"}
      - {engine: voltage, color: blue, param: AMPERE, direction: high, audible_tendency: "higher = warmer saturation", reason: "warm vintage saturation"}
    fx_overlays:
      - {fx: spring, color: blue, param: TONE, direction: low, audible_tendency: "higher = brighter", reason: "dark retro spring tone"}
      - {fx: terminal, color: blue, param: KHZ, direction: low, audible_tendency: "lower = crunchier", reason: "retro sample-rate reduction"}
    envelope_hint: "medium attack, medium release"
    lfo_hint: "slow, warm detune"

  futuristic:
    acoustic_meaning: "high filter, FM/ring-mod/digital waveform, metallic resonance, evolving modulation"
    params:
      - {engine: dna, color: orange, param: NOISE, direction: high, audible_tendency: "higher = noisier", reason: "CPU-noise synthesis = futuristic alien tone"}
      - {engine: digital, color: grey, param: "DETUNE / RING MOD", direction: high, audible_tendency: "upper half = clangorous/metallic", reason: "ring mod = futuristic clang"}
      - {engine: fm, color: blue, param: "FREQ (FM AMOUNT)", direction: high, audible_tendency: "higher = brighter/clangier/more bite", reason: "FM = futuristic metallic"}
    fx_overlays:
      - {fx: cwo, color: blue, param: FREQ, direction: high, audible_tendency: "higher = weirder/detuned", reason: "frequency shifting = futuristic"}
      - {fx: grid, color: grey, param: FEEDBACK, direction: high, audible_tendency: "higher = denser/self-oscillating", reason: "comb grid = futuristic space"}
      - {fx: nitro, color: grey, param: Q, direction: high, audible_tendency: "higher = squelchier", reason: "high Q = futuristic filter sweep"}
    envelope_hint: "medium attack, long release"
    lfo_hint: "fast, evolving modulation"

  detuned:
    acoustic_meaning: "multiple oscillators, pitch drift, wide stereo, slow modulation"
    params:
      - {engine: cluster, color: grey, param: SPREAD, direction: high, audible_tendency: "higher = wider/more detuned", reason: "detune spread across oscillators"}
      - {engine: voltage, color: orange, param: DETUNE, direction: high, audible_tendency: "higher = thicker/detuned", reason: "sub-osc detune"}
      - {engine: fm, color: orange, param: DETUNE, direction: high, audible_tendency: "higher = more movement/clang", reason: "operator detune for movement"}
      - {engine: cluster, color: orange, param: UNISON, direction: high, audible_tendency: "higher = more movement/shimmer", reason: "drift speed/range of detuning"}
    fx_overlays: []
    envelope_hint: "medium attack, medium release"
    lfo_hint: "slow Value LFO on detune parameter for organic drift"

  noisy:
    acoustic_meaning: "high noise floor, distorted waveform, chaotic modulation"
    params:
      - {engine: dna, color: orange, param: NOISE, direction: high, audible_tendency: "higher = noisier", reason: "noise amount mixed into synthesis"}
      - {engine: voltage, color: ochre, param: GROUND NOISE, direction: high, audible_tendency: "higher = grittier/noisier", reason: "ground noise distortion"}
      - {engine: digital, color: orange, param: DIGITALNESS, direction: high, audible_tendency: "higher = grittier/lo-fi", reason: "digital noise/grit"}
    fx_overlays:
      - {fx: phone, color: ochre, param: GSM, direction: high, audible_tendency: "higher = chunkier glitch", reason: "granular noise"}
      - {fx: phone, color: grey, param: BAUD, direction: high, audible_tendency: "higher = more digital destruction", reason: "bit-crush noise"}
    envelope_hint: "fast attack, short release"
    lfo_hint: "random LFO for chaotic noise modulation"

  bell-like:
    acoustic_meaning: "inharmonic FM partials, high resonance, sine carrier, medium-fast decay"
    params:
      - {engine: fm, color: blue, param: "FREQ (FM AMOUNT)", direction: medium, audible_tendency: "higher = brighter/clangier/more bite", reason: "moderate FM = bell partials (raise from sine)"}
      - {engine: fm, color: ochre, param: "FREQUENCY RATIO", direction: specific_value, audible_tendency: "harmonic vs discordant jumps", reason: "step to an inharmonic ratio for bell character"}
      - {engine: fm, color: orange, param: DETUNE, direction: high, audible_tendency: "higher = more movement/clang", reason: "detune adds bell shimmer"}
    fx_overlays:
      - {fx: delay, color: blue, param: RANGE, direction: low, audible_tendency: "higher = longer", reason: "short echo = bell reflections"}
    envelope_hint: "instant attack, long natural decay (bell archetype)"
    lfo_hint: "slow, subtle detune for shimmer"

  plucky:
    acoustic_meaning: "instant attack, short decay, low sustain, physical model waveform"
    params:
      - {engine: string, color: blue, param: TENSION, direction: high, audible_tendency: "high = tight/plucky/short", reason: "tight string = plucky"}
      - {engine: string, color: ochre, param: "IMP (DECAY)", direction: low, audible_tendency: "low = short pluck", reason: "short impulse decay = pluck"}
      - {engine: string, color: orange, param: IMP TYPE, direction: low, audible_tendency: "low = hard strike (plectrum)", reason: "hard strike = plucky transient"}
    fx_overlays: []
    envelope_hint: "instant attack, short decay, low sustain, short release (pluck archetype)"
    lfo_hint: "none (static)"

  punchy:
