# OP-1 Field Intent Mapping
# ============================================================
# Maps user vibes -> patch-planning decisions. Does NOT hardcode a single engine —
# it RANKS candidates so the compiler can pick (or the user can override).
#
# Used by Step C of the SKILL workflow (candidate ranking). The intent parser matches
# the user request against aliases, builds a sound_target, then ranks engine/FX/LFO
# candidates by score_bias. Higher score_bias = stronger default pick.
#
# All engine/fx/lfo ids must exist in op1_recipe_compiler_reference.yaml.
# ============================================================

schema_version: "1.0"

# Sound-target vocabulary (kept loose on purpose — these are descriptors, not numbers):
#   brightness: dark | medium_dark | medium | medium_bright | bright
#   width:      narrow | medium | wide | very_wide
#   density:    thin | medium | thick | very_thick
#   motion:     static | slow_subtle | moderate | fast | chaotic
#   space:      dry | small | medium | large | huge
#   attack:     instant | fast | medium | slow
#   sustain:    none | low | medium | high
#   release:    short | medium | long | very_long
#   articulation: pluck | stab | sustained | percussive | evolving

intents:

  lush_80s_pad:
    aliases: ["lush pad", "80s pad", "dreamy analog pad", "wide synth pad", "lush 80s pad", "lush", "shimmer", "warm pad", "thick pad", "analog pad", "dreamy", "lush keys"]
    category: pad
    sound_target: {brightness: medium_dark, width: very_wide, density: very_thick, motion: slow_subtle, space: large, attack: slow, sustain: high, release: long, articulation: sustained}
    engine_candidates:
      - {engine: cluster,   reason: "dense multi-wave detuned pad", score_bias: 0.90}
      - {engine: dimension, reason: "wavetable+filter pad with stereo width", score_bias: 0.75}
      - {engine: voltage,   reason: "warm analog-modeled pad", score_bias: 0.62}
    envelope_archetype: pad
    play_mode: poly
    fx_candidates:
      - {fx: mother, reason: "large gated 80s reverb"}
      - {fx: spring, reason: "retro colored reverb"}
      - {fx: delay,  reason: "echo space without wash"}
    lfo_candidates:
      - {lfo: value,  reason: "slow cyclic motion on spread/filter"}
      - {lfo: random, reason: "organic drift"}
    correction_macros:
      - {symptom: "too bright", screen_action: "lower Mother COLOR or reduce Cluster WAVE ENV"}
      - {symptom: "too static", screen_action: "raise LFO AMOUNT slightly or add Cluster detune"}
      - {symptom: "too wet",    screen_action: "lower FX MIX before shortening release"}

