# ------------------------------------------------------------
# Generic fallback when no intent matches
# ------------------------------------------------------------
fallback:
  default_intent: null
  strategy: "If no alias matches, look up the user's adjectives in op1_adjective_index.yaml (references/op1_adjective_index.yaml) to get concrete params and directions. Use those params to bias engine/FX/LFO selection: pick the engine whose params appear most frequently across the matched adjectives. If adjectives are ambiguous or not in the index, fall back to the sound_target vocabulary (brightness/width/density/motion/space/articulation) and pick the engine whose best_for tags overlap most. Default engine = digital (all-rounder). Default envelope = keys. Default play_mode = poly. Default FX = none (state dry). Default LFO = none (state static)."
