    modes:
      poly:    {desc: "polyphonic — chords and pads"}
      mono:    {desc: "monophonic — single-note bass/leads"}
      legato:  {desc: "monophonic, no re-trigger on overlap — smooth glide leads"}
      unison:  {desc: "stacked detuned voices on one note — fat leads/supersaw"}

  # ----------------------------------------------------------
  # LFOs (page: lfo). EACH TYPE HAS A DIFFERENT T1-T4 LAYOUT.
  # Source-conflict note: display_format.md and screen_behavior.yaml disagree on Random
  # encoder mapping. We follow screen_behavior.yaml / device observation: Blue=Speed, Ochre=Amount.
  # ----------------------------------------------------------
  lfos:

    none:
      name: "None / Static"
      emoji: ""
      musical_role: "No LFO — static patch."
      params: null

    value:
      name: "Value"
      emoji: "〰️"
      musical_role: "Standard LFO with selectable shape. Pick destination + parameter, set speed/amount."
      params:
        blue:   {label: "SPEED",     value_type: relative_speed, action: "Turn Blue to set LFO SPEED (no number on screen — tempo-synced position). TAP Blue to cycle the 4 wave shapes: Square, Ramp, Saw, Sine (book p.129).", shapes: ["Square", "Ramp", "Saw", "Sine"]}
        ochre:  {label: "AMOUNT",    value_type: bipolar_signed, range: [-100, 100], action: "Turn Ochre to set AMOUNT (modulation depth, -100 to +100; book p.128).", confidence: high, user_verified: true}
        grey:   {label: "DEST",      value_type: discrete_selector, action: "Turn Grey to pick the destination (engine / envelope / FX icon)."}
        orange: {label: "PARAMETER", value_type: discrete_selector, action: "Turn Orange to pick the exact target parameter."}
      shape_note: "Shape (square/ramp/saw/sine) is selected on the SPEED control — tap/press Blue to cycle the waveform icon, turn to set rate (book p.128-129)."
      required_recipe_fields: [speed, amount, destination, target_parameter]
      confidence: high
      user_verified: true
      source: "OP-1 Field Notebook p.128-130"

    element:
      name: "Element"
      emoji: "⚡"
      musical_role: "External/internal source as mod source (mic, line, radio, USB, G-force, envelope, sum/main-out)."
      params:
        blue:   {label: "SOURCE",    value_type: discrete_selector, options: ["Mic", "Envelope", "G-Force", "Sum", "Line", "FM Radio", "USB", "Headset"], action: "Turn Blue to pick the SOURCE: Mic, Envelope, G-Force, or Sum (main out). Audio-input variants (Line, FM Radio, USB, Headset) appear when connected (book p.133)."}
        ochre:  {label: "AMOUNT",    value_type: bipolar_signed, range: [-100, 100], action: "Turn Ochre to set AMOUNT (modulation depth, -100 to +100; book p.133).", confidence: high, user_verified: true}
        grey:   {label: "DEST",      value_type: discrete_selector, action: "Turn Grey to pick the destination module."}
        orange: {label: "PARAMETER", value_type: discrete_selector, action: "Turn Orange to pick the target parameter."}
      required_recipe_fields: [source, amount, destination, target_parameter]
      confidence: high
      user_verified: true
      source: "OP-1 Field Notebook p.132-134"

    random:
      name: "Random"
      emoji: "🎲"
      musical_role: "Continuous internal random modulation. Organic drift, instability."
      params:
        blue:   {label: "SPEED",       value_type: relative_speed, action: "Turn Blue to set the random update SPEED (no number on screen)."}
        ochre:  {label: "AMOUNT",      value_type: numeric_0_99, range: [0, 100], action: "Turn Ochre to set AMOUNT (randomization depth, 0 to +100; book p.137).", confidence: high, user_verified: true}
        grey:   {label: "DESTINATION", value_type: discrete_selector, action: "Turn Grey to pick the destination category."}
        orange: {label: "PARAMETER",   value_type: discrete_selector, action: "TAP Orange to pick the target parameter (or ALL). TURN Orange to set the modulation AD envelope: 0-50 = attack fade-in, 50-100 = decay fade-out (book p.138).", split_function: "turn = AD envelope (0-50 attack / 50-100 decay); tap = parameter select"}
      required_recipe_fields: [speed, amount, destination, target_parameter]
      amount_non_negative: true
      confidence: high
      user_verified: true
      source: "OP-1 Field Notebook p.136-138"
      conflict_note: "RESOLVED by OP-1 Field Notebook p.137: Blue=Speed, Ochre=Amount (confirms screen_behavior.yaml; display_format.md was wrong). Random modulates ALL params in the destination category if no specific parameter selector is available."

    tremolo:
      name: "Tremolo"
      emoji: "🌊"
      user_verified: true
      source: "OP-1 Field Notebook p.140-142"
      musical_role: "Modulates pitch AND volume on two parallel paths. No destination select (hardwired)."
      params:
        blue:   {label: "SPEED",        value_type: graphic_only, action: "Turn Blue to set the shared SPEED (both paths)."}
        ochre:  {label: "PITCH AMOUNT", value_type: bipolar_signed, action: "Turn Ochre to set PITCH modulation depth (negative inverts)."}
        grey:   {label: "VOLUME AMOUNT", value_type: bipolar_signed, action: "Turn Grey to set VOLUME modulation depth (negative inverts)."}
        orange: {label: "ENVELOPE",     value_type: graphic_only, action: "Turn Orange to shape the AD envelope (0-50 = attack fade-in, 50-100 = decay fade-out). Hold [Shift] + Turn Orange to pick 1 of 5 wave shapes: Sine, Saw, Exp, Square, Blip (book p.142).", shapes: ["Sine", "Saw", "Exp", "Square", "Blip"]}
      shift_params:
        orange: {label: "SHAPE", value_type: discrete_selector, options: ["sine", "saw", "exp", "square", "blip"], action: "Hold [Shift], turn Orange to pick the modulation waveform."}
      required_recipe_fields: [speed, pitch_amount, volume_amount]
      destination_hardwired: "Pitch (note icon) + Volume (speaker icon) — no destination selector."
      confidence: medium

    velocity:
      name: "Velocity"
      emoji: "🎹"
      musical_role: "Keyboard velocity as mod source. Best with an external MIDI controller. Blue = volume amount, Ochre = destination amount."
      params:
        blue:   {label: "VOLUME AMOUNT", value_type: bipolar_signed, range: [0, 100], action: "Turn Blue to set the VOLUME amount (0 to +100) — how much velocity affects master volume.", confidence: high, user_verified: true, source: "OP-1 Field Notebook p.145"}
        ochre:  {label: "DEST AMOUNT",   value_type: bipolar_signed, range: [-100, 100], action: "Turn Ochre to set the DESTINATION amount (-100 to +100) — how much velocity affects the chosen parameter.", confidence: high, user_verified: true, source: "OP-1 Field Notebook p.145"}
        grey:   {label: "DEST",      value_type: discrete_selector, action: "Turn Grey to pick the destination category."}
        orange: {label: "PARAMETER", value_type: discrete_selector, action: "Press/turn Orange to cycle the target parameter."}
      required_recipe_fields: [volume_amount, dest_amount, destination, target_parameter]
      confidence: high
      user_verified: true
      source: "OP-1 Field Notebook p.144-146"
      note: "CORRECTED from book p.145: Blue = Volume amount (0 to +100), Ochre = Destination amount (-100 to +100). Ochre is NOT unused — the earlier reference data was wrong."

    midi:
      name: "MIDI"
      emoji: "🎹"
      user_verified: true
      source: "OP-1 Field Notebook p.148-150"
      musical_role: "Incoming MIDI CC controls four destinations. Each encoder = one CC channel."
      params:
        blue:   {label: "CC 1", value_type: discrete_selector, action: "Blue = CC channel 1: pick its destination + parameter."}
        ochre:  {label: "CC 2", value_type: discrete_selector, action: "Ochre = CC channel 2: pick its destination + parameter."}
        grey:   {label: "CC 3", value_type: discrete_selector, action: "Grey = CC channel 3: pick its destination + parameter."}
        orange: {label: "CC 4", value_type: discrete_selector, action: "Orange = CC channel 4: pick its destination + parameter."}
      required_recipe_fields: [cc_channels]
      no_shared_speed_amount: true
      confidence: medium
      note: "MIDI LFO does NOT have shared Speed/Amount and is NOT a normal Value LFO — do not pretend CC1-CC4 are speed/amount/dest/param."

# ------------------------------------------------------------
# Provenance + global confidence notes
# ------------------------------------------------------------
provenance:
  high_confidence_sources:
    - "Numeric FX params (Delay, CWO, Phone, Punch numerics, Terminal, Mother Distance, Grid Feedback) — confirmed numeric on screen via native vision."
    - "LFO Value encoder layout — display_format.md + screen_behavior.yaml agree."
  known_conflicts:
    - "Random LFO encoder map: display_format.md (Blue=Amount) vs screen_behavior.yaml (Blue=Speed). Following screen_behavior.yaml."
    - "Punch Blue/Ochre (FREQ vs PUNCH): RESOLVED — screen_behavior.yaml native-vision wins (Blue=PUNCH [N], Ochre=FREQ [G]). engines_effects_v2.yaml had them reversed; fixed in v3.0.1."
    - "Delay RANGE: was tagged numeric_0_99 with range [0,99], but the screen shows actual milliseconds (e.g. 126). Fixed to numeric_ms with range [0,800] in v3.0.1. Same class of bug as the Dimension FILTER FREQ Hz issue."
  unverified_or_provisional:
    - "Most graphic-only engine params (String, Pulse, Phase, Voltage, DNA, DSynth, Vocoder) have NO on-screen numbers — exact values are always provisional and must be rendered as visual targets, not numbers."
    - "Fazer (easter egg) — low confidence throughout."
  value_policy: "Treat all numeric recipe values as PROVISIONAL unless from a tested patch anchor. Prefer ~centers (~60) or ranges (55-70). For graphic-only controls, describe what to watch, never invent a number."
