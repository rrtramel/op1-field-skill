# OP-1 Field Recipe Compiler Reference
# ============================================================
# CANONICAL MERGED REFERENCE — the normalized source of truth for the recipe compiler.
#
# Merged from (all on-disk, authoritative):
#   - references/screen_behavior.yaml      (native-vision screen extraction: [N]/[G]/[B], labels, visuals)
#   - references/display_format.md         (encoder->param mapping per LFO type, MIDI CC, non-linear behavior)
#   - references/engines_effects_v2.yaml   (param NAMES + ranges, device + TE official guide + community refs)
#   - references/community_tips.md         (correction-macro material, real-world technique)
#
# NOTE on the prompt's "newly generated reference layers"
# (op1_engine_semantics_v0_1.yaml / op1_sound_design_semantics_v0_2.yaml /
#  op1_screen_action_layer_v0_3.yaml): those draft files do NOT exist anywhere in this
# environment. They were the prompt author's intermediate artifacts that never landed on
# disk. This reference is therefore built directly from the four authoritative files above,
# which ARE the real source of truth and supersede any phantom draft.
#
# Naming convention: encoders are named by COLOR. Canonical = Blue / Ochre / Grey / Orange.
#   "Beige" is an accepted INPUT alias for Ochre (see naming_aliases). Output always uses Ochre.
#   "Red" is an accepted input alias for Orange. "Gray" == "Grey" (output uses Grey).
#
# Legend for value_type screen-display:
#   [N] numeric value shown on screen   [G] graphic only, no number   [B] both number + graphic
# ============================================================

schema_version: "1.0"
purpose: "OP-1 Field recipe compiler reference"
source_files:
  - "references/screen_behavior.yaml"
  - "references/display_format.md"
  - "references/engines_effects_v2.yaml"
  - "references/community_tips.md"

# ------------------------------------------------------------
# Encoder color naming + aliases
# ------------------------------------------------------------
naming_aliases:
  canonical_order: [blue, ochre, grey, orange]   # T1, T2, T3, T4
  input_aliases:
    blue:   ["blue", "t1"]
    ochre:  ["ochre", "beige", "t2"]
    grey:   ["grey", "gray", "t3"]
    orange: ["orange", "red", "t4"]
  display_names:    # what the renderer prints
    blue: "Blue"
    ochre: "Ochre"
    grey: "Grey"
    orange: "Orange"

# ------------------------------------------------------------
# Global page navigation / controls (what to physically press)
# ------------------------------------------------------------
global_controls:
  pages:
    engine:
      open: "Press [Synth], then [T1]."
      select: "Hold [Shift]+[T1], turn a knob to choose the engine."
    envelope:
      open: "Press [Synth], then [T2]."
      note: "Envelope screen shows a colored ADSR curve with dots and NO numbers."
    play_mode:
      open: "From the envelope page, hold [Shift]+[T2]."
      note: "Play Mode / Portamento / Bend Range / Volume live here."
    fx:
      open: "Press [Synth], then [T3]."
      toggle: "Press [T3] to turn FX on/off."
      select: "Hold [Shift]+[T3], turn a knob to choose the effect."
    lfo:
      open: "Press [Synth], then [T4]."
      toggle: "Press [T4] to turn the LFO on/off."
      select: "Hold [Shift]+[T4], turn a knob to choose the LFO type."
  encoder_colors:
    blue: "leftmost (T1)"
    ochre: "second (T2)"
    grey: "third (T3)"
    orange: "rightmost (T4)"
  value_facts:
    - "On-screen values are INTEGERS, never percentages (the screen shows '42', not '42%')."
    - "Most params are 0-99 on screen; MIDI CC maps them to 0-127."
    - "Some params are discrete small ranges (e.g. Vocoder Bands 0-7, DSynth MODE 1-7)."
    - "Some params are bipolar (e.g. Vocoder Formant -4..+4, LFO AMOUNT -100..+100). Digital OCTAVE is NOT bipolar — it is 0-6 unsigned, 3 = unison (book p.83)."
    - "Several params are split-range / center-detent — see split_ranges section."

# ------------------------------------------------------------
# Value display types — how the renderer phrases each control
# ------------------------------------------------------------
value_types:
  numeric_0_99:
    desc: "Plain integer 0-99 shown on screen."
    render: "Turn {color} until {label} reads about {value}."
  numeric_small_discrete:
    desc: "Small discrete count shown on screen (e.g. waves 0-6, bands 0-7)."
    render: "Turn {color} until {label} shows {value}."
  numeric_decimal:
    desc: "Decimal value shown on screen (e.g. Terminal KHZ 3.8, BITS 4.0)."
    render: "Turn {color} until {label} reads about {value}."
  numeric_hz:
    desc: "A FREQUENCY in Hz shown on screen (NOT a 0-99 knob). E.g. Dimension FILTER FREQ displays a Hz value with a default around 500 and a max of ~18000 (fully open). Low Hz values clamp the low-pass filter shut and can be SILENT."
    render: "Turn {color} until {label} reads about {value} Hz."
  numeric_ms:
    desc: "A time in milliseconds shown on screen (NOT a 0-99 knob). E.g. Delay RANGE displays ms. The screen prints the actual ms value (e.g. 126). community_tips.md landmarks: slapback ~80-150 ms, rhythmic ~200-350 ms, dub/ambient ~400-800+ ms."
    render: "Turn {color} until {label} reads about {value} ms."
  graphic_only:
    desc: "No number on screen; watch the engine-specific graphic."
    render: "Turn {color} until the {label} graphic looks {visual_target}."
  numeric_plus_graphic:
    desc: "Number AND graphic both shown ([B])."
    render: "Turn {color} until {label} reads ~{value} (graphic: {visual_target})."
  visual_curve:
    desc: "Envelope curve/dot position; NO number on screen."
    render: "Turn {color} so the {label} part of the curve is {visual_target}."
  discrete_selector:
    desc: "Cycles named options (waveform, mode, source, etc)."
    render: "Turn/tap {color} until {label} shows {target}."
  bipolar_signed:
    desc: "Signed value; negative reverses/inverts."
    render: "Turn {color} to {value} ({label}); negative reverses the direction."
  relative_speed:
    desc: "LFO rate. ONE knob crosses a boundary between two modes (CONFIRMED on the real device by the owner): turning from full-left to full-right runs NUMBERS first (8,7,...,2,1 = TEMPO-SYNCED divisions; 8 = slowest, counts DOWN to 1 = fastest synced), then it flips into a CLOCK-FACE (FREE-RUNNING, ignores tempo) whose needle starts ~1 o'clock and sweeps around toward 6 o'clock at the far right, getting faster as it sweeps. So overall left→right ≈ slow→fast: 8 (slowest synced) → 1 → clock 1 o'clock → clock 6 o'clock (fastest free). The 'half number / half clock' look is the knob parked right at the crossover. There is NO single clean speed number to print — say which zone + feel. (A separate '0000' digital readout in the screen corner is tempo/fine value, NOT the SPEED value.)"
    render: "Turn {color} to set SPEED ({visual_target}) — left = synced numbers (8 slow → 1 fast), right = free-run clock (1→6 o'clock, faster). Dial by ear while it moves."
  split_range:
    desc: "Behavior changes across the knob's travel; center may be special."
    render: "Turn {color} into the {region} range — {warning_or_target}."
  shift_layer:
    desc: "Only reachable while holding [Shift]."
    render: "Hold [Shift] and turn {color} until {label} is {target}."
  tap_selector:
    desc: "Tap/press the encoder to switch its sub-function (e.g. Value LFO speed vs shape)."
    render: "Tap {color} to switch {label}; turn to set it."

# ------------------------------------------------------------
# Split-range / center-detent / non-linear warnings (validator-enforced)
# ------------------------------------------------------------
split_ranges:
  dr_wave_filter:          # Dr.Wave Ochre
    engine: dr_wave
    color: ochre
    rule: "0 = no filter. 1-49 = HIGH-PASS. 50 = fully filtered (SILENCE). 51-99 = LOW-PASS."
    warning: "Avoid landing exactly on 50 — the engine goes silent there."
  dr_wave_phase:           # Dr.Wave Grey
    engine: dr_wave
    color: grey
    rule: "0-49 = pulse width. 50+ = adds wave cycles (sync) + harmonics."
  digital_detune_ringmod:  # Digital Grey
    engine: digital
    color: grey
    rule: "Lower half (0-49) = detune the sub oscillator. Upper half (50-99) = ring modulation ON."
    warning: "Crossing 50 flips from detune into ring-mod — very different timbre."
  pulse_mod:               # Pulse Orange
    engine: pulse
    color: orange
    rule: "50 = NO modulation (center). 49->0 = PWM depth+speed increasing. 51->99 = faster PWM linked to 2nd Pulse (TIME)."
    warning: "50 is the off/center detent — leave it there for a static pulse."
  terminal_model:          # Terminal Grey
    fx: terminal
    color: grey
    rule: "Below 3 = HIGH-PASS. ~3 = no filter. Above 3 = LOW-PASS."
  digital_octave:          # Digital Ochre
    engine: digital
    color: ochre
    rule: "Sub-osc octave, 0-6. 3 = same octave as the main oscillator."

# ============================================================
# MODULES
# ============================================================
modules:

  # ----------------------------------------------------------
  # SYNTH ENGINES (page: engine)
  # ----------------------------------------------------------
  synths:

    cluster:
      name: "Cluster"
      emoji: "🌊"
      user_verified: true
      source: "OP-1 Field Notebook p.80-81"
      musical_role: "Massive multi-oscillator supersaw. Up to 6 detuned waves."
      best_for: ["wide pads", "supersaw leads", "synth brass", "huge chords"]
      screen_summary: "4 colored speech-bubble values over 4 stacked jagged wave lines."
      params:
        blue:   {label: "WAVES",    value_type: numeric_0_99, mechanism: "number of stacked oscillators (up to 6 audible), but the SCREEN shows a 0-99 value (display reads e.g. 99 when fully clockwise)", audible_tendency: "higher = thicker, wider", action: "Turn Blue up (toward 99) for max thickness; the screen shows a 0-99 number, not a count.", useful_regions: ["high (80-99) for big pads/leads"], range: [0, 99], confidence: high, user_verified: true, source: "OP-1 Field Notebook p.80-81 (screen shows 99)"}
        ochre:  {label: "WAVE ENV", value_type: split_range,            mechanism: "filter envelope shape: 0-9 inverted saw, 10-49 sine-based, 50+ aggressive supersaw", audible_tendency: "higher = brighter/more aggressive", action: "Turn Ochre into the upper zone (~60) for a bright supersaw, low for mellow.", range: [0, 99], confidence: medium}
        grey:   {label: "SPREAD",   value_type: numeric_0_99,           mechanism: "detune spread across oscillators", audible_tendency: "higher = wider/more detuned", action: "Turn Grey up (~80) until the white wave line spreads wide.", range: [0, 99], confidence: high}
        orange: {label: "UNISON",   value_type: numeric_0_99,           mechanism: "drift speed/range of the detuning", audible_tendency: "higher = more movement/shimmer", action: "Turn Orange (~55) for slow drift.", range: [0, 99], confidence: high}
      shift_params: null
      warnings: []

    digital:
      name: "Digital"
      emoji: "💎"
      user_verified: true
      source: "OP-1 Field Notebook p.82-83"
      musical_role: "Raw digital oscillator + ring mod. Clean to grungy."
      best_for: ["all-rounder leads", "grungy bass", "lo-fi chiptune", "metallic bells (ring mod)"]
      screen_summary: "One active param label + big number + knob icon; purple polyhedron graph on the left."
      params:
        blue:   {label: "WAVE SHAPER", value_type: numeric_plus_graphic, mechanism: "wave shape from square toward saw, adds noise/distortion", audible_tendency: "higher = brighter/grittier", action: "Turn Blue until WAVE SHAPER reads the brightness you want (graphic morphs).", range: [0, 99], confidence: high}
        ochre:  {label: "OCTAVE",      value_type: numeric_small_discrete, mechanism: "sub-osc octave 0-6; 3 = same octave as main osc", audible_tendency: "lower = deeper sub", action: "Turn Ochre to set sub octave (3 = unison).", range: [0, 6], confidence: high, user_verified: true, source: "OP-1 Field Notebook p.83: 'tunes a sub oscillator in a range from 0 to 6 octaves with 3 the same as main oscillator.' Unsigned selector, NOT a center-detent split.", see: digital_octave}
        grey:   {label: "DETUNE / RING MOD", value_type: split_range,    mechanism: "0-49 detune sub, 50+ ring modulation ON", audible_tendency: "upper half = clangorous/metallic", action: "Keep Grey low for fat detune; push past 50 for ring-mod bell tones.", range: [0, 99], confidence: high, see: digital_detune_ringmod}
        orange: {label: "DIGITALNESS", value_type: numeric_0_99,         mechanism: "adds digital noise/grit", audible_tendency: "higher = grittier/lo-fi", action: "Turn Orange up for digital grit, down for clean.", range: [0, 99], confidence: high}
      shift_params: null
      warnings: ["Grey center crossover at 50 flips detune->ring mod."]

    dimension:
      name: "Dimension"
      emoji: "📐"
      musical_role: "Wavetable position through a real subtractive filter. Field-exclusive."
      best_for: ["acid", "plucks", "leads", "evolving pads"]
      screen_summary: "WAVEFORM label + wave icons, oscilloscope line, FILTER FREQ number (in Hz), red RES triangle."
      user_verified: true
      source: "OP-1 Field Notebook p.84-85"
      params:
        blue:   {label: "WAVEFORM",    value_type: discrete_selector, mechanism: "wavetable position: Noise/Pulse/Square/Saw/Sub Saw", audible_tendency: "varies by wave", action: "Turn Blue until the highlighted WAVEFORM box shows the wave you want.", range: [0, 99], confidence: high, user_verified: true, source: "OP-1 Field Notebook p.85"}
        ochre:  {label: "STEREO",      value_type: graphic_only,      mechanism: "chorus/width modulation", audible_tendency: "higher = wider", action: "Turn Ochre until the oscilloscope line thickens/doubles for width.", range: [0, 99], confidence: high, user_verified: true, source: "OP-1 Field Notebook p.85"}
        grey:   {label: "FILTER FREQ", value_type: numeric_hz,         mechanism: "low-pass cutoff shown on screen as a frequency in Hz. Default ~500 (which is fairly DARK), range up to ~18000 (fully open). Practical landmarks: ~500-1500 = dark/closed pad, ~2000-4000 = warm mid, ~5000-9000 = bright lead, ~12000+ = wide open. Below ~300 Hz the filter is nearly shut = silent.", audible_tendency: "higher Hz = brighter", action: "Turn Grey until FILTER FREQ reads the cutoff you want IN HZ. NOT a 0-99 knob. Dark pad ~800-1500, bright lead ~6000, wide open ~14000. Note the on-screen default 500 is already quite dark.", range: [0, 18000], unit: "Hz", confidence: high, user_verified: true, source: "OP-1 Field Notebook p.85 (screen shows 500 default) + SON WU Dimension tutorial + TE user guide"}
        orange: {label: "RES",         value_type: graphic_only,      mechanism: "filter resonance at cutoff", audible_tendency: "higher = squelchier/acid", action: "Turn Orange until the red RES triangle grows for resonance.", range: [0, 99], confidence: high}
      shift_params: null
      warnings: ["FILTER FREQ is a Hz value (NOT 0-99): default ~500, max ~18000 = fully open. Low Hz (e.g. 40-500) = filter nearly shut = quiet/silent. Source: OP-1 Field Notebook p.85, user_verified."]

    dna:
      name: "DNA"
      emoji: "🧬"
      user_verified: true
      source: "OP-1 Field Notebook p.86-87"
      musical_role: "CPU-noise synthesis. Glitchy, harsh, organic, industrial."
      best_for: ["experimental textures", "glitch", "percussion", "alien drones"]
      screen_summary: "Hex-tile grid + vertical red filter line. No numbers."
      params:
        blue:   {label: "FILTER",      value_type: graphic_only, mechanism: "filter cutoff (never fully closes)", audible_tendency: "higher = brighter", action: "Turn Blue; the vertical red line moves to set cutoff.", range: [0, 99], confidence: medium}
        ochre:  {label: "CPU ID / WAVE NUMBER", value_type: graphic_only, mechanism: "navigates noise segments (wave number)", audible_tendency: "varies wildly", action: "Turn Ochre slowly; hex tiles rearrange as the wave number changes.", range: [0, 99], confidence: medium}
        grey:   {label: "WAVE MODIFIER", value_type: graphic_only, mechanism: "modulates pitch detune + timbre", audible_tendency: "varies", action: "Turn Grey to mutate tone; use iteratively with CPU ID.", range: [0, 99], confidence: medium}
        orange: {label: "NOISE",       value_type: graphic_only, mechanism: "amount of noise mixed in", audible_tendency: "higher = noisier", action: "Turn Orange until noise particles appear between tiles.", range: [0, 99], confidence: medium}
      shift_params: null
      warnings: ["Entirely graphic — never quote exact numbers for DNA params."]

    dr_wave:
      name: "Dr. Wave"
      emoji: "🩺"
      user_verified: true
      source: "OP-1 Field Notebook p.88-89"
      musical_role: "Frequency-domain wave shaping. Buzzy leads, lo-fi pads, organ chords."
      best_for: ["buzzy leads", "lo-fi pads", "organ", "formant/vocal effects"]
      screen_summary: "Jagged waveform line + popup with active param (e.g. PHASE 47)."
      params:
        blue:   {label: "TYPE & LENGTH", value_type: numeric_plus_graphic, mechanism: "0-50 morph saw->square->triangle, 50+ sample-rate reduction", audible_tendency: "higher = more lo-fi/crushed", action: "Turn Blue; popup shows a number and the waveform steps change shape.", range: [0, 99], confidence: medium}
        ochre:  {label: "FILTER",        value_type: split_range,          mechanism: "0 off, 1-49 HP, 50 silence, 51-99 LP", audible_tendency: "depends on side", action: "Turn Ochre into the HP (1-49) or LP (51-99) range; AVOID 50 (silence).", range: [0, 99], confidence: high, see: dr_wave_filter}
        grey:   {label: "PHASE",         value_type: split_range,          mechanism: "0-49 pulse width, 50+ adds cycles/harmonics", audible_tendency: "higher = brighter/formant", action: "Turn Grey for pulse width; above 50 adds harmonics.", range: [0, 99], confidence: medium, see: dr_wave_phase}
        orange: {label: "CHORUS",        value_type: numeric_0_99,         mechanism: "0 off, 1-99 chorus modulation speed", audible_tendency: "higher = more chorus", action: "Turn Orange up for chorus width, 0 = dry.", range: [0, 99], confidence: medium}
      shift_params: null
      warnings: ["Ochre 50 = silence; Blue label on screen reads PHASE despite being Type&Length."]

    dsynth:
      name: "DSynth"
      emoji: "🎛️"
      user_verified: true
      source: "OP-1 Field Notebook p.78-79"
      musical_role: "Dual oscillator with envelope crossfader, 7 cross-mod modes, and a filter. The 'advanced' engine."
      best_for: ["thick layered tones", "complex evolving sounds", "cross-mod textures"]
      screen_summary: "Labels XFADE/OSC 1/ENV/MODE + central red MODE knob (1-7). Shift layer adds OSC 2 + FILTER."
      params:
        blue:   {label: "XFADE", value_type: graphic_only, mechanism: "crossfade between osc1/osc2 envelopes", audible_tendency: "sets which osc dominates", action: "Turn Blue; the blue dot in the XFADE knob graphic rotates.", range: [0, 99], confidence: medium}
        ochre:  {label: "OSC 1", value_type: discrete_selector, mechanism: "osc1 waveform mix sine->square->saw", audible_tendency: "saw = bright, sine = pure", action: "Turn Ochre; the OSC 1 slider indicator moves between wave shapes.", range: [0, 99], confidence: medium}
        grey:   {label: "ENV",   value_type: graphic_only, mechanism: "osc1 envelope amplification", audible_tendency: "shapes osc1 level", action: "Turn Grey; the dot in the ENV knob graphic moves.", range: [0, 99], confidence: medium}
        orange: {label: "MODE",  value_type: numeric_small_discrete, mechanism: "cross-modulation mode 1-7", audible_tendency: "each mode = different cross-mod character", action: "Turn Orange; central red knob pointer moves among 1-7.", range: [1, 7], confidence: high}
      shift_params:
        blue:   {label: "OSC 2",     value_type: graphic_only, mechanism: "osc2 pitch division vs played note", action: "Hold [Shift], turn Blue to set osc2 pitch.", confidence: medium}
        ochre:  {label: "OSC 2 wav", value_type: discrete_selector, mechanism: "osc2 waveform mix sine->square->saw", action: "Hold [Shift], turn Ochre to pick osc2 wave.", confidence: medium}
        grey:   {label: "ENV osc2",  value_type: graphic_only, mechanism: "osc2 envelope amplification", action: "Hold [Shift], turn Grey to shape osc2 level.", confidence: medium}
        orange: {label: "FILTER",    value_type: numeric_small_discrete, mechanism: "filter cutoff (number in a square)", action: "Hold [Shift], turn Orange; FILTER number changes.", confidence: medium}
      warnings: ["DSynth has TWO full param layers. Recipes MUST include the SHIFT layer (OSC 2 / OSC 2 wav / ENV osc2 / FILTER) or the engine is half-dialed."]

    fm:
      name: "FM"
      emoji: "📻"
      user_verified: true
      source: "OP-1 Field Notebook p.90-91"
      musical_role: "4-operator FM. Glassy bells, EPiano, metallic percussion, aggressive leads."
      best_for: ["bells", "EPiano/keys", "metallic percussion", "aggressive FM leads"]
      screen_summary: "Four 3D operator cubes (showing freq ratios) + yellow FREQ number (FM amount)."
      params:
        blue:   {label: "FREQ (FM AMOUNT)", value_type: numeric_plus_graphic, mechanism: "FM modulation intensity; 0 = pure sine", audible_tendency: "higher = brighter/clangier/more bite", action: "Start Blue near 0 (sine), raise until it bites.", range: [0, 99], confidence: high}
        ochre:  {label: "FREQUENCY RATIO", value_type: discrete_selector, mechanism: "operator freq ratios (8 discrete values per operator). Book p.91 ratio sets: row1 [1/16, 2, 5/8, 4, 1.75, 7/16, 3.5, 1], row2 [2, 1.5, 1, 1/2, 3/4, 1/4, 5/32, 1/32], row3 [1/64, 3/32, 1/8, 5/16, 1/2, 5/8, 1, 2]", audible_tendency: "harmonic vs discordant jumps; higher ratios = brighter/more metallic", action: "Turn Ochre carefully; cubes show ratios (1, 2, 1/2, etc). Adjacent steps jump harmonic<->discordant. Bell tones: integer ratios (2, 4). Harsh/metallic: fractional ratios (5/16, 3/32).", range: [0, 99], confidence: medium}
        grey:   {label: "TOPOLOGY",   value_type: discrete_selector, mechanism: "FM algorithm (carrier/modulator routing)", audible_tendency: "changes harmonic structure", action: "Turn Grey; cubes reconnect into a different algorithm.", range: [0, 99], confidence: medium}
        orange: {label: "DETUNE",     value_type: numeric_0_99,      mechanism: "operator detune for movement/inharmonicity", audible_tendency: "higher = more movement/clang", action: "Turn Orange for organic detune/movement.", range: [0, 99], confidence: high}
      shift_params: null
      warnings: ["Ochre/Grey are discrete jumps — describe as 'step until harmonic', never a precise number."]

    phase:
      name: "Phase"
      emoji: "🌀"
      user_verified: true
      source: "OP-1 Field Notebook p.92-93"
      musical_role: "Casio CZ-style phase distortion. Starts from sine, warps to buzzy/retro."
      best_for: ["retro 80s leads", "warm digital pads", "springy arps"]
      screen_summary: "Two waveform graphs (PHASE/DIST left, FILTER/TILT right). NO numbers."
      params:
        blue:   {label: "PHASE",  value_type: graphic_only, mechanism: "phase shift adds harmonics, sine->square", audible_tendency: "higher = brighter/buzzier", action: "Turn Blue; left blue/yellow sines shift apart adding harmonics.", range: [0, 99], confidence: medium}
        ochre:  {label: "DIST",   value_type: graphic_only, mechanism: "wave distortion / clipping-folding", audible_tendency: "higher = grittier", action: "Turn Ochre; left waveforms distort/fold.", range: [0, 99], confidence: medium}
        grey:   {label: "FILTER", value_type: graphic_only, mechanism: "amplitude shaping (NOT a freq filter)", audible_tendency: "emphasizes harmonics", action: "Turn Grey; right red/grey wave amplitude changes.", range: [0, 99], confidence: medium}
        orange: {label: "TILT",   value_type: graphic_only, mechanism: "asymmetric wave folding -> noise/harmonics", audible_tendency: "higher = noisier/harsher", action: "Turn Orange; right waveforms fold asymmetrically.", range: [0, 99], confidence: medium}
      shift_params: null
      warnings: ["Fully graphic engine — no numbers. FILTER here is wave-shaping, not frequency cutoff."]

    pulse:
      name: "Pulse"
      emoji: "⚡"
      user_verified: true
      source: "OP-1 Field Notebook p.94-95"
      musical_role: "Dual pulse train + PWM. Hollow, funky, brassy, drones."
      best_for: ["PWM pads", "funky/hollow bass", "brass", "futuristic sequences"]
      screen_summary: "Pulse-train bars + red PWM squiggle. NO numbers. AMPL (y) / TIME (x) axes."
      params:
        blue:   {label: "FILTERO", value_type: graphic_only, mechanism: "filter cutoff w/ envelope follower", audible_tendency: "higher = brighter", action: "Turn Blue; pulse bar heights shift with cutoff.", range: [0, 99], confidence: medium, youtube_verified: true, source: "SON WU Pulse tutorial — screen shows FILTERO not FILTER"}
        ochre:  {label: "AMPL",   value_type: graphic_only, mechanism: "pulse train amplitude/volume", audible_tendency: "higher = louder/fuller", action: "Turn Ochre; overall bar heights change.", range: [0, 99], confidence: medium}
        grey:   {label: "TIME (2ND PULSE)", value_type: graphic_only, mechanism: "pulse width / 2nd-pulse relationship", audible_tendency: "off-center = hollow/PWM-ready", action: "Turn Grey; 2nd pulse bar width changes vs the first.", range: [0, 99], confidence: medium}
