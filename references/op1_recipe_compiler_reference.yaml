  # ----------------------------------------------------------
  # ENVELOPE (page: envelope) — NO NUMBERS, visual curve only
  # ----------------------------------------------------------
  envelope:
    page: envelope
    screen_summary: "Colored ADSR curve with dots; NO numbers on the steady-state screen."
    params:
      blue:   {label: "ATTACK",  value_type: visual_curve, action: "Turn Blue; watch the blue dot at the curve start (right = slower attack)."}
      ochre:  {label: "DECAY",   value_type: visual_curve, action: "Turn Ochre; watch the ochre dot at the peak (right = longer decay)."}
      grey:   {label: "SUSTAIN", value_type: visual_curve, action: "Turn Grey; watch the grey dot height on the plateau (up = higher sustain)."}
      orange: {label: "RELEASE", value_type: visual_curve, action: "Turn Orange; watch the red dot at the curve end (right = longer release)."}
    archetypes:
      pluck:      {attack: "instant (dot far left)", decay: "short drop from peak", sustain: "low plateau", release: "short fade"}
      pad:        {attack: "gradual rise (dot ~halfway)", decay: "slow gentle drop", sustain: "high plateau (dot near top)", release: "long right tail"}
      lead:       {attack: "instant", decay: "moderate drop", sustain: "solid plateau", release: "medium fade"}
      bass:       {attack: "instant", decay: "controlled drop", sustain: "high plateau", release: "short fade"}
      keys:       {attack: "instant", decay: "moderate drop", sustain: "medium plateau", release: "medium fade"}
      swell:      {attack: "slow rise (dot far right)", decay: "no drop", sustain: "max plateau", release: "medium fade"}
      percussive: {attack: "instant", decay: "very fast drop", sustain: "no plateau (dot at bottom)", release: "minimal fade"}
      drone:      {attack: "very slow rise", decay: "no drop", sustain: "max plateau", release: "very long fade"}
      stab:       {attack: "instant", decay: "quick drop", sustain: "low plateau", release: "short fade"}
      bell:       {attack: "instant", decay: "long natural drop", sustain: "low/none plateau", release: "medium-long fade"}

