# OP-1 Field Recipe Examples / Test Suite
# ============================================================
# 20 intermediate recipe objects, one per required test prompt. Each is compiled
# and validated by scripts/op1_compile.py via scripts/run_tests.py.
#
# These double as worked examples for the SKILL (how a filled recipe object looks)
# AND as the regression test corpus. Every object here must pass all error-level rules.
# ============================================================

recipes:

  # 1) lush 80s pad
  - recipe:
      title: "LUSH 80s PAD"
      user_request: "lush 80s pad"
      intent_id: lush_80s_pad
      confidence: provisional
      category: pad
      sound_target: {brightness: medium_dark, width: very_wide, density: very_thick, motion: slow_subtle, space: large, articulation: sustained}
      engine:
        id: cluster
        page: engine
        selection_instruction: "Press [Synth] → [T1]. Hold [Shift]+[T1], choose CLUSTER."
        params:
          blue:   {label: "WAVES", value: 6, visual_target: null, value_type: numeric_small_discrete, action_phrase: "Turn Blue until WAVES shows 6.", reason: "max thickness"}
          ochre:  {label: "WAVE ENV", value: 60, visual_target: "upper zone", value_type: split_range, action_phrase: "Turn Ochre into the upper zone (~60).", reason: "bright supersaw"}
          grey:   {label: "SPREAD", value: 80, visual_target: null, value_type: numeric_0_99, action_phrase: "Turn Grey to ~80.", reason: "wide detune"}
          orange: {label: "UNISON", value: 55, visual_target: null, value_type: numeric_0_99, action_phrase: "Turn Orange to ~55.", reason: "slow drift"}
        shift_params: null
      envelope:
        archetype: pad
        page: envelope
        visual_shape: {blue_attack: "gradual rise (dot ~halfway)", ochre_decay: "slow gentle drop", grey_sustain: "high plateau (dot near top)", orange_release: "long right tail"}
      play_mode: {mode: poly, portamento: "off or low", reason: "chordal pad"}
      fx:
        id: mother
        page: fx
        enabled: true
        selection_instruction: "Press [T3]. Hold [Shift]+[T3], choose MOTHER. Press [T3] so FX is ON."
        params:
          blue:   {label: "DISTANCE", value: 70, visual_target: null, value_type: numeric_0_99, action_phrase: "Turn Blue to ~70.", reason: "big room"}
          ochre:  {label: "GATE", value: null, visual_target: "moderate; don't fully choke the tail", value_type: graphic_only, action_phrase: "Turn Ochre; door animates.", reason: "keep tail"}
          grey:   {label: "COLOR", value: null, visual_target: "slightly dark", value_type: graphic_only, action_phrase: "Turn Grey; hue warm/dark.", reason: "warm tone"}
          orange: {label: "MIX", value: null, visual_target: "medium, not washed out", value_type: graphic_only, action_phrase: "Turn Orange; MIX bar medium.", reason: "balanced"}
      lfo:
        id: value
        page: lfo
        enabled: true
        selection_instruction: "Press [T4]. Hold [Shift]+[T4], choose VALUE. Press [T4] so LFO is ON."
        params:
          blue:   {label: "SPEED", value: null, visual_target: "slow", value_type: relative_speed, action_phrase: "Turn Blue for a slow rate. tap for sine.", reason: "slow"}
          ochre:  {label: "AMOUNT", value: 18, visual_target: null, value_type: numeric_0_99, action_phrase: "Turn Ochre small (~18).", reason: "subtle"}
          grey:   {label: "DEST", value: null, visual_target: "Synth (engine)", value_type: discrete_selector, action_phrase: "Turn Grey to Synth.", reason: "modulate engine"}
          orange: {label: "PARAMETER", value: null, visual_target: "SPREAD", value_type: discrete_selector, action_phrase: "Turn Orange to SPREAD.", reason: "moving detune"}
        destination: "Synth (engine)"
        target_parameter: "SPREAD"
      correction_macros:
        - {symptom: "too bright", screen_action: "lower Mother COLOR (Grey) or reduce WAVE ENV (Ochre)"}
        - {symptom: "too static", screen_action: "raise LFO AMOUNT (Ochre)"}
      provenance: {source_files: ["op1_recipe_compiler_reference.yaml"], warnings: ["Cluster WAVE ENV is split-range; numbers provisional."]}

